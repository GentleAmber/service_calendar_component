<style>
  #calendarBody {
    color: black;
  }
  select {
    width: 100%; 
    padding: 10px; 
    font-size: 16px;
    margin-bottom: 16px; 
    border: 1px solid #ccc; 
    border-radius: 6px;
  }
	.week-nav {
    display: flex; 
    justify-content: space-between;
    align-items: center; 
    margin-bottom: 12px;
    font-size: 14px;
  }
  .week-nav button {
    padding: 6px 14px; 
    border: 1px solid #ccc;
    border-radius: 6px; 
    background: #fff; cursor: pointer;
  }
  #errorMsg {
    color: red;
  }
  .hidden {
    display: none;
  }
  .nonbookable {
    background-color: gray;
  }
  .modal {
    position: absolute;
  }
</style>

<!-- calendar body -->
<div id="calendarBody">
  <div id="errorMsg">Unable to load services. Please refresh and try again.</div>
  <select id="serviceSelect">
    <option value="">-- Choose a service --</option>
  </select>

  <div>
    <button id="currentWeek">Current week</button>
  </div>

  <div class="week-nav">
    <button id="prevWeek">&larr; Previous week</button>
    <span id="weekLabel"></span>
    <button id="nextWeek">Next week &rarr;</button>
  </div>

  <div id="modal" class="modal hidden">
    <button class="close-btn" id="modalCloseBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 4L14 14M14 4L4 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
 
    <p class="heading">Choose your session</p>
    <p class="sub">Select a duration that works for you</p>
 
    <div class="modal-options" id="modalOptions"></div>
 
    <button class="confirm-btn" id="confirmBtn">Confirm</button>
  </div>

  <div id="calendarContainer"></div>
</div>

<script>
  console.log("Child v2.0.4. Test everything before step 5. Filled const services[].");
  const monthName = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  var headerDate = new Date();
  var services = [];

  renderCalendar();

  /* Listeners */
  // ** Main listener for messages from parent window ** ---------
  // Should always check the received array's length 
  window.addEventListener("message", (event) => {
    const { type, data } = event.data;

    if (type == "SET_SERVICES") {
      services = data; 
      renderDropdown(data);
    }

    if (type == "SET_APPO_SLOTS") {
      renderAppoSlots(data);
    }

    if (type == "SET_CLS_SLOTS") {
      renderClassSlots(data);
    }
  });

  // Listeners for booking ----------------
  window.addEventListener('click', (e) => {
    if (e.target.classList.contains('book-appo')) {
      const serviceId = e.target.dataset.serviceId;
      const staffId = e.target.dataset.staffId;
      const startDate = e.target.dataset.startDate;
      const endDate = e.target.dataset.endDate;
      
      window.parent.postMessage({
        type: 'REQ_BOOK_APPO',
        data: {
          serviceId: serviceId,
          staffId: staffId,
          startDate: startDate,
          endDate: endDate,
          timeZone: "Europe/London",
        }
      }, '*');
    }

    if (e.target.classList.contains('book-cls')
    && !e.target.classList.contains('nonbookable')) {
      const serviceId = e.target.dataset.serviceId;
      const sessionId = e.target.dataset.sessionId;
      const startDate = e.target.dataset.startDate;
      const endDate = e.target.dataset.endDate;

      window.parent.postMessage({
        type: 'REQ_BOOK_CLS',
        data: {
          sessionId: sessionId,
          startDate: startDate,
          endDate: endDate,
          timeZone: "Europe/London",
        }
      }, '*');
    }
  });

  // Listeners for date & slots update 
  document.getElementById("prevWeek").addEventListener('click', () => {
    const TODAY = new Date();

    if (getMonday(headerDate) <= getMonday(TODAY)) {
      return;
    }
    headerDate.setDate(headerDate.getDate() - 7);
    renderCalendar();

    const serviceId = document.getElementById("serviceSelect").value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  document.getElementById("nextWeek").addEventListener('click', () => {
    headerDate.setDate(headerDate.getDate() + 7);
    renderCalendar();

    const serviceId = document.getElementById("serviceSelect").value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  document.getElementById("currentWeek").addEventListener('click', () => {
    headerDate = new Date();
    renderCalendar();

    const serviceId = document.getElementById("serviceSelect").value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  document.getElementById("serviceSelect").addEventListener('change', (e) => {
    const serviceId = e.target.value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  /* Major functions */
  /**
   * Renders the calendar frame upon loading and every time date 
   * is changed.
   */
  function renderCalendar() {
    const weekLabel = document.getElementById("weekLabel");
    const preWeekButton = document.getElementById("prevWeek");
    const nexWeekButton = document.getElementById("nextWeek");
    const dateArray = getWeekList(headerDate);
    const calendarContainer = document.getElementById("calendarContainer");
    const screenWidth = window.innerWidth;
    const TODAY = new Date();

    const WEEKDAY_LABEL = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    // Render week label
    weekLabel.innerHTML = getCalendarHeader(headerDate);

    // Render previous button
    if (getMonday(headerDate) <= getMonday(TODAY)) {
      preWeekButton.style.color = "gray";
    } else {
      preWeekButton.style.color = "black";
    }

    // Render dates in the current week
    let dHtml = ``;
    let labelIndex = 0; // For week day labels
    // For larger screens:
    if (screenWidth > 900) {
      dateArray.forEach((date) => {
        dHtml += `
        <div class="calendar-column">
          <div class="date-label">
            <span>${WEEKDAY_LABEL[labelIndex]}</span>
            <span>${date}</span>
          </div>
          <div class="service" data-date=${date}>No service</div>
        </div>
        `;
        labelIndex++;
      });
    } else {
      // To be written for smaller screens
    }

    calendarContainer.innerHTML = dHtml;
  }

  /**
   * Send requests to parent window for service slots rendering
   * for a given service id.
   */
  function requestServiceSlots(serviceId) {
    const serviceType = services.find(s => s.id == serviceId)?.serviceType;

    if (serviceType == "APPOINTMENT") {
      window.parent.postMessage({
        type: "GET_APPO_SLOTS",
        data: {
          serviceId: serviceId, 
          startDate: formatDate(getMonday(headerDate)),
          endDate: formatDate(getSunday(headerDate))
        }
      }, '*');

    } else if (serviceType == "CLASS") {
      console.log(`queried service id: ${serviceId}`)
      window.parent.postMessage({
        type: "GET_CLS_SLOTS",
        data: {
          serviceId: serviceId,
          startDate: formatDate(getMonday(headerDate)),
          endDate: formatDate(getSunday(headerDate))
        }
      }, '*');
    }
  }

  /**
   * Renders appointment slots based on the data passed from parent window.
   */
  function renderAppoSlots(data) {
    let rawHtml = ``;
    const select = document.getElementById('serviceSelect');
    const serviceName = select.options[select.selectedIndex].text;
    const serviceId = select.options[select.selectedIndex].value;

    data.forEach((s) => {
      const target = document.querySelector(`.service[data-date="${new Date(s.endDate).getDate()}"]`);
      
      const duration = new Date(s.endDate) - new Date(s.startDate);
      const durationFormatted = formatDuration(duration);
      
      for (let i = 1; i <= s.staffList.length; i++){
        rawHtml += `
        <div class='avai-service avai-appo'>
          <p class='service-time'>${hourFormat(new Date(s.startDate))} - ${hourFormat(new Date(s.endDate))}</p>
          <p class='service-title'>${serviceName}</p>
          <p class='staff'>${s.staffList[i-1].name}</p>
          <p class='duration'>${durationFormatted}</p>
          <button class='book-appo book-service'
          data-service-id='${serviceId}'
          data-staff-id='${s.staffList[i-1]._id}'
          data-start-date='${s.startDate}'
          data-end-date='${s.endDate}'>
          Book
          </button>
        </div>
        `;
      }

      target.innerHTML = rawHtml;
    });
  }

  /**
   * Renders class slots based on the data passed from parent window.
   */
  function renderClassSlots(data) {
    let rawHtml = ``;
    const select = document.getElementById('serviceSelect');
    const serviceName = select.options[select.selectedIndex].text;
    const serviceId = select.options[select.selectedIndex].value;

    data.forEach((s) => {
      const target = document.querySelector(`.service[data-date="${new Date(s.endDate).getDate()}"]`);
      
      const duration = new Date(s.endDate) - new Date(s.startDate);
      const durationFormatted = formatDuration(duration);

      const capacityText = 
      s.bookable ? 
      `${s.bookableCapacity} spots left` : 
      "Registration closed";

      const buttonClass = 
      s.bookable ? 
      "book-cls book-service" : 
      "nonbookable book-cls book-service";

      rawHtml += `
      <div class='avai-service avai-cls'>
        <p class='service-time'>${hourFormat(new Date(s.startDate))} - ${hourFormat(new Date(s.endDate))}</p>
        <p class='service-title'>${serviceName}</p>
        <p class='staff'>${s.staff}</p>
        <p class='duration'>${durationFormatted}</p>
        <p class='capacity'>${capacityText}</p>
        <button class='${buttonClass}'
        data-service-id='${serviceId}'
        data-session-id='${s.sessionId}'
        data-start-date='${s.startDate}'
        data-end-date='${s.endDate}'>
        Book
        </button>
      </div>
      `;

      target.innerHTML = rawHtml;
    });
  }

  /**
   * Renders dropdown selection options based on the data 
   * passed from parent window.
   */
  function renderDropdown(data) {
    const select = document.getElementById("serviceSelect");

    if (data.length != 0) {
      document.getElementById("errorMsg").classList.add("hidden");

      data.forEach((s) => {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name;
        select.appendChild(opt);
      });
    } else {
      document.getElementById("errorMsg").value = "No available service. Please contact us.";
      document.getElementById("errorMsg").classList.remove("hidden");
    }
  }

  /* Helper functions */
  /** 
   * Return the mm-yy info for calendar header.
   */
  function getCalendarHeader(date) {
    const monday = getMonday(date)
    const sunday = getSunday(date)
 
    // Show both years if a week falls in to them, e.g. Dec 2024 - Jan 2025
    if (monday.getFullYear() != sunday.getFullYear()) {
      return `${monthName[monday.getMonth()]} ${monday.getFullYear()} — ${monthName[sunday.getMonth()]} ${sunday.getFullYear()}`
    } else {
      // Show both months if a week falls in two months, e.g. Apr - May 2026
      if (monday.getMonth() != sunday.getMonth()) {
        
        return `${monthName[monday.getMonth()]} — ${monthName[sunday.getMonth()]} ${sunday.getFullYear()}`
      // Otherwise just return MM YY, e.g. Apr 2026
      } else {
        return `${monthName[monday.getMonth()]} ${monday.getFullYear()}`
      }
    }
  }

  /** 
   * Return an array of date list for the selected week.
   * e.g. [4, 5, 6, 7, 8, 9, 10]
   */
  function getWeekList(date) {
    const monday = getMonday(date)
    const sunday = getSunday(date)
    const days = []

    const d = new Date(monday)

    while(d <= sunday) {
      days.push(d.getDate())
      d.setDate(d.getDate() + 1)
    }

    return days
  }

  /** 
   * Take a Date object, return the formatted string for API query.
   */
  function formatDate(d) {
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hours = String(d.getHours()).padStart(2, '0');
    const minutes = String(d.getMinutes()).padStart(2, '0');
    const seconds = String(d.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
  }

  /** 
   * Take an int (ms), return the formatted hr&min display of duration.
   */
  function formatDuration(ms) {
    const totalMinutes = Math.floor(ms / 60000);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    
    if (hours > 0 && minutes > 0) {
      return `${hours}hr${minutes}min`;
    } else if (hours > 0) {
      return `${hours}hr`;
    } else {
      return `${minutes}min`;
    }
  }

  /** 
   * Take a Date object, return a Date object which is the Monday of
   * the week the parameter falls into.
   * 
   * e.g. return 4 May 2026 for 5 May 2026.
   */
  function getMonday(date) {
    // Make a copy to work with
    const d = new Date(date)

    const param = d.getDay() == 0 ? -6 : 1
    d.setDate(d.getDate() + param - d.getDay())
    d.setHours(0, 30, 0, 0)
    return d
  }

  /** 
   * Take a Date object, return a Date object which is the Sunday of
   * the week the parameter falls into.
   * 
   * e.g. return 10 May 2026 for 5 May 2026.
   */
  function getSunday(date) {
    const d = new Date(date)

    const param = d.getDay() == 0 ? 0 : 7
    d.setDate(d.getDate() + param - d.getDay())
    d.setHours(23, 30, 0, 0)
    return d
  }

  /** 
   * Take a Date object, return string of the hour in this format: "hh:mm"
   * 
   * e.g. return 10:30.
   */
  function hourFormat(date) {
    // Pad the hour with a leading zero if it's less than 10
    const hour = date.getHours();
    const minutes = date.getMinutes();

    const paddedHour = String(hour).padStart(2, '0');
    const paddedMinutes = String(minutes).padStart(2, '0');
    return `${paddedHour}:${paddedMinutes}`;
  }
</script>
