<style>
  @import url("https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&display=swap");
  
  #calendarBody {
    --service-box-min-height: 100px;
    --service-box-width: 180px;
    --border-color-service-box: #a4a4a4;
    --box-main-background: 217, 173, 89;
    --box-active-background: 181, 142, 70;
    --font-color-major: black;
    --font-color-secondary: #757272;
    --font-size: 18px;
    --font-size-secondary: 16px;
    --font-size-third: 14px;
    --font-size-important: 22px;
    
    font-size: var(--font-size);
    color: var(--font-color-secondary);
    display: flex;
    flex-direction: column;
    place-items: center;
  }
  @media (max-width: 1500px) {
    #calendarBody {
      --service-box-width: 150px;
    }
  }
  @media (max-width: 1200px) {
    #calendarBody {
      --service-box-width: 130px;
    }
  }
  @media (max-width: 1000px) {
    #calendarBody {
      --service-box-width: 100px;
    }
  }
  #calendarBody p {
    margin: 0.3em 0;
  }
  #calendarTitle {
    font-size: var(--font-size-important);
    font-weight: 550;
    color: var(--font-color-major);
    text-align: center;
    padding-bottom: 0.7em;
    border-bottom: 0.8px solid var(--font-color-secondary);
    max-width: 1200px;
    min-width: 600px;
  }
 .gelasio {
    font-family: "Gelasio", serif;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: normal;
  }
	.week-nav {
    display: flex; 
    justify-content: center;
    gap: 30px;
    align-items: center; 
    margin-bottom: 30px;
  }
  .error {
    color: red;
  }
  #hint {
    color: rgb(25, 96, 228);
  }
  #weekLabel {
    color: var(--font-color-major);
  }
  .filter-wrapper {
    --font-size-filter: var(--font-size-secondary);

    display: flex;
    justify-content: center;
    align-items: center;
    margin: 1em 0; 
    font-size: var(--font-size-filter);
  }
  .selector {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: var(--font-size-filter);
  }
  .custom-select-wrapper {
    position: relative;
  }
  .selector-arrow {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-right: 1px solid currentColor;
    border-bottom: 1px solid currentColor;
    transform: rotate(45deg);
    margin-bottom: 3px;
    transition: transform 0.2s, margin-bottom 0.2s;
  }
  .arrow-left, .arrow-right {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-right: 1px solid currentColor;
    border-bottom: 1px solid currentColor;
    vertical-align: middle;
    margin-bottom: 1px;
  }
  .arrow-left  { transform: rotate(135deg); }
  .arrow-right { transform: rotate(-45deg); }
  .selector[aria-expanded="true"] .selector-arrow {
    transform: rotate(225deg);
    margin-bottom: -3px;
  }
  .selector-list {
    --li-padding-hori: 0.5em;
    --li-padding-ver: 1em;

    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    z-index: 100;
    background: white;
    border: 1px solid #ccc;
    list-style: none;
    padding: 0;
    margin: 0;
    min-width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    color: var(--font-color-major);
  }
  .selector-list.scrollable {
    max-height: calc(5 * calc(var(--font-size-filter) + 2 * var(--li-padding-hori)));
    overflow-y: auto;
  }
  .selector-list li {
    padding: var(--li-padding-hori) var(--li-padding-ver);
    cursor: pointer;
    white-space: nowrap;
  }
  .selector-list li:hover {
    background: #f9ecc9;
  }
  .selector-list li.selected {
    background: rgba(181, 141, 68, 0.25)
  }
  .selector-list p {
    text-align: center;
  }
  #calendarContainer {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    font-size: var(--font-size-third);
    row-gap: 20px;
  }
  #calendarContainer.mobile {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-wrap: nowrap;
  }
  #calendarContainer.hidden {
    display: none;
  }
  .calendar-column {
    text-align: center;
    display: flex;
    flex-direction: column;
  }
  .date-label {
    margin-bottom: 15px;
  }
  .service {
    min-height: var(--service-box-min-height);
    width: var(--service-box-width);
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    justify-content: flex-start;
    flex-grow: 1;
    border: 0.5px solid var(--border-color-service-box);
  }
  .avai-service:not(.mobile) {
    border-bottom: 0.5px solid var(--border-color-service-box);
  }
  .service.empty {
    background-color: #e5e5e5;
    justify-content: center;
  }
  .avai-service {
    padding: 10px;
    color: var(--font-color-major);
    background-color: white;
    text-align: left;
    display: flex;
    flex-direction: column;
  }
  .avai-service div + div {
    margin-top: 0.4em;
    color: var(--font-color-secondary);
  }
  /* .avai-service > button {
    font-size: 1em;
  } */
  .avai-service button {
    align-self: stretch;
    color: white;
    margin-top: 0.5em;
    padding: 0.3em 0;
    border: none;
    background-color: rgb(var(--box-main-background));
    font-size: var(--font-size-secondary);
  }
  .avai-service button:not(.nonbookable):active {
    background-color: rgb(var(--box-active-background));
  }
  button.nonbookable {
    background-color: rgb(144, 142, 142);
    color: white;
  }
  .change-week {
    border: none;
    background-color: transparent;
    cursor: pointer;
    font-size: var(--font-size-secondary);
  }
  #currentWeekContainer {
    display: flex;
    justify-content: center;
    margin-bottom: 1em;
    text-decoration: underline;
  }
  #currentWeek {
    color: var(--font-color-secondary);
  }

  #loadingMsg {
    display: flex;
    justify-content: center;
    margin: 2em 0 0 0;
  }
  #loadingMsg.hidden {
    display: none;
  }
  @keyframes spin { 
    to { 
      transform: rotate(360deg); 
    } 
  }
  .spinner {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 5px solid #d0cdcd;
    border-top-color: rgb(217, 173, 89);
    animation: spin 1s ease-out infinite;
  }
  
  /* For mobile */
  #dateWrapper {
    display: flex;
    column-gap: 10px;
    flex-wrap: nowrap;
  }
  #mobileServiceSlots {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    align-items: center;
    justify-content: center;
    border: 0.5px solid var(--border-color-service-box);
    min-height: 150px;
  }
  #mobileServiceSlots.empty {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #mobileServiceSlots.empty::after {
    content: "No service";
  }
  .mobile-date-label {
    display: flex;
    flex-direction: column;
    place-items: center;
  }
  .date-to-choose {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    padding: 0.2em 5px;
  }
  .date-to-choose.dot:after {
    content: '';
    display: block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    margin: 3px auto 0;
  }
  .date-to-choose.active {
    background-color: rgb(var(--box-main-background));
    color: white;
  }
  #mobileServiceSlots.single-visible {
    width: 220px;
  }
  #mobileServiceSlots.single-visible > div:not(.hidden) {
    grid-column: span 2;
  }
  .hidden {
    display: none;
  }
</style>

<!-- calendar body -->
<div id="calendarBody" class="gelasio">
  <div id="calendarTitle"><h3>Book Now</h3></div>
  <div id="errorMsg" class="hidden error"><p>Unable to load services. Please refresh and try again.</p></div>
  <div id="hint" class="hidden"></div>
  <div class="filter-wrapper">
    <span>Filter by:</span>
    <div class="custom-select-wrapper">
      <button id="serviceSelect" class="gelasio selector" aria-expanded="false">
        <span class="selector-label">-- Choose a service --</span>
        <span class="selector-arrow"></span>
      </button>
      <ul id="serviceSelectList" class="selector-list scrollable hidden"></ul>
    </div>
    <!-- <span>|</span>
    <div class="custom-select-wrapper">
      <button id="staffSelect" class="gelasio selector" aria-expanded="false">
        <span class="selector-label">Staff (All)</span>
        <span class="selector-arrow"></span>
      </button>
      <ul id="staffSelectList" class="selector-list hidden"></ul>
    </div> -->
  </div>
  
  <div id="currentWeekContainer">
    <button id="currentWeek" class="change-week gelasio">Current week</button>
  </div>

  <div class="week-nav">
    <button id="prevWeek" class="change-week gelasio"><span class="arrow-left"></span> Previous</button>
    <span id="weekLabel"></span>
    <button id="nextWeek" class="change-week gelasio">Next <span class="arrow-right"></span></button>
  </div>

  <div id="errorMsg2" class="hidden error">Unable to load slots. Please refresh and try again.</div>
  <div id="loadingMsg" class="hidden">
    <div class="spinner"></div>
  </div>
  <div id="calendarContainer"></div>
</div>

<script>
  const monthName = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  var headerDate = new Date();
  var services = [];
  const serviceSelectState = {
    options: [{ text: '-- Choose a service --', value: '' }],
    selectedIndex: 0,
    value: '',
  };
  var selectedDate = new Date();
  const isLgScreen = window.innerWidth > 800;
  const loadingMsg = document.getElementById("loadingMsg");
  const calendarContainer = document.getElementById("calendarContainer");
  // let selectedStaffIds = [];

  renderCalendar();

  /* Listeners */
  // ** Main listener for messages from parent window ** ---------
  // Should always check the received array's length 
  window.addEventListener("message", (event) => {
    const { type, data } = event.data;

    if (type == "SET_SERVICES") {
      services = data; 
      renderDropdown(data);
    }

    if (type == "SET_APPO_SLOTS") {
      renderAppoSlots(data);
      removeHint();
      toggleErrorGetSlots({showErr: false, message: ""});
    }

    if (type == "SET_CLS_SLOTS") {
      renderClassSlots(data);
      removeHint();

      toggleErrorGetSlots({showErr: false, message: ""});
    }

    if (type == "SET_APPO_SLOTS_VARIANTS") {
      renderAppoSlots(data.slots);
      renderHint(data.serviceUrl);
      toggleErrorGetSlots({showErr: false, message: ""});
    }

    if (type == "ERROR_GET_SERVICES") {
      showErrorGetServices(1);
    }

    if (type == "ERROR_GET_SLOTS") {
      toggleErrorGetSlots({showErr: true, message: "Unable to load slots. Please refresh and try again."});
    }

    if (type == "ERROR_BOOK_CLS") {
      toggleErrorGetSlots({showErr: true, message: "Unable to book the slot with this plug-in. Please use the Booking page instead: https://www.blueskypilates.co.uk/book-online"});
    }
  });

  // Listeners for booking ----------------
  window.addEventListener('click', (e) => {
    if (e.target.classList.contains('book-appo')) {
      const serviceId = e.target.dataset.serviceId;
      const staffId = e.target.dataset.staffId;
      const startDate = e.target.dataset.startDate;
      const endDate = e.target.dataset.endDate;
      
      window.parent.postMessage({
        type: 'REQ_BOOK_APPO',
        data: {
          serviceId: serviceId,
          staffId: staffId,
          startDate: startDate,
          endDate: endDate,
          timeZone: "Europe/London",
        }
      }, '*');
    }

    if (e.target.classList.contains('book-cls')
    && !e.target.classList.contains('nonbookable')) {
      const serviceId = e.target.dataset.serviceId;
      const startDate = e.target.dataset.startDate;
      const endDate = e.target.dataset.endDate;

      window.parent.postMessage({
        type: 'REQ_BOOK_CLS',
        data: {
          serviceId: serviceId,
          startDate: startDate,
          endDate: endDate,
          timeZone: "Europe/London",
        }
      }, '*');
    }
  });

  // Listeners for date & slots update 
  document.getElementById("prevWeek").addEventListener('click', () => {
    const TODAY = new Date();

    if (getMonday(headerDate) <= getMonday(TODAY)) {
      return;
    }
    headerDate.setDate(headerDate.getDate() - 7);
    renderCalendar();

    const serviceId = serviceSelectState.value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  document.getElementById("nextWeek").addEventListener('click', () => {
    headerDate.setDate(headerDate.getDate() + 7);
    renderCalendar();

    const serviceId = serviceSelectState.value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  document.getElementById("currentWeek").addEventListener('click', () => {
    headerDate = new Date();
    renderCalendar();

    const serviceId = serviceSelectState.value;
    if (serviceId != "") {
      requestServiceSlots(serviceId);
    } 
  })

  // Service dropdown toggle
  document.getElementById("serviceSelect").addEventListener('click', (e) => {
    e.stopPropagation();
    const btn = document.getElementById("serviceSelect");
    const list = document.getElementById("serviceSelectList");
    const isOpen = btn.getAttribute('aria-expanded') === 'true';
    closeAllDropdowns();
    if (!isOpen) {
      btn.setAttribute('aria-expanded', 'true');
      list.classList.remove('hidden');
    }
  });
  document.getElementById("serviceSelectList").addEventListener('click', (e) => {
    e.stopPropagation();
  });

  // Mobile date selection
  calendarContainer.addEventListener('click', (e) => {
    const dateEl = e.target.closest('.date-to-choose');
    if (!dateEl) return;

    const serviceSlots = document.getElementById("mobileServiceSlots");
    selectedDate = new Date(dateEl.dataset.date);

    // Move .active highlight
    document.querySelectorAll('.date-to-choose.active')
      .forEach(el => el.classList.remove('active'));
    dateEl.classList.add('active');

    // Change text
    document.getElementById("availabilityDate").textContent = `Availability for ${formatDateForMobileCalendar(selectedDate)}`;
    // Toggle slot visibility only if this date has slots
    if (dateEl.classList.contains('dot')) {
      serviceSlots.classList.remove("empty");
      const dateStr = dateEl.dataset.date;
      document.querySelectorAll('.mobile.avai-service').forEach(slot => {
        if (slot.dataset.endDatePure == dateStr) {
          slot.classList.remove('hidden');
        } else {
          slot.classList.add('hidden');
        }
      });
      fixMobileSlotLayout();
    } else {
      document.querySelectorAll('.mobile.avai-service').forEach(slot => {
        slot.classList.add('hidden');
      });
      serviceSlots.classList.add("empty");
    }    
  });


  // Staff dropdown toggle
  // document.getElementById("staffSelect").addEventListener('click', (e) => {
  //   e.stopPropagation();
  //   const btn = document.getElementById("staffSelect");
  //   const list = document.getElementById("staffSelectList");
  //   const isOpen = btn.getAttribute('aria-expanded') === 'true';
  //   closeAllDropdowns();
  //   if (!isOpen) {
  //     btn.setAttribute('aria-expanded', 'true');
  //     list.classList.remove('hidden');
  //   }
  // });
  // document.getElementById("staffSelectList").addEventListener('click', (e) => {
  //   e.stopPropagation();
  // });

  // Close dropdowns on outside click
  document.addEventListener('click', () => {
    closeAllDropdowns();
  });

  function closeAllDropdowns() {
    document.getElementById("serviceSelect").setAttribute('aria-expanded', 'false');
    document.getElementById("serviceSelectList").classList.add('hidden');
    // document.getElementById("staffSelect").setAttribute('aria-expanded', 'false');
    // document.getElementById("staffSelectList").classList.add('hidden');
  }

  /* Major functions */
  /**
   * Renders the calendar frame upon loading and every time date 
   * is changed.
   */
  function renderCalendar() {
    const weekLabel = document.getElementById("weekLabel");
    const preWeekButton = document.getElementById("prevWeek");
    const nexWeekButton = document.getElementById("nextWeek");
    const dateArray = isLgScreen ? getWeekList(headerDate) : getWeekListForMobile(headerDate);
    
    const TODAY = new Date();

    const WEEKDAY_LABEL = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    // Render week label
    weekLabel.innerHTML = getCalendarHeader(headerDate);

    // Render previous button
    if (getMonday(headerDate) <= getMonday(TODAY)) {
      preWeekButton.style.color = "gray";
    } else {
      preWeekButton.style.color = "black";
    }

    // Render dates in the current week
    let dHtml = ``;
    let labelIndex = 0; // For week day labels
    // For larger screens:
    if (isLgScreen) {
      dateArray.forEach((date) => {
        dHtml += `
        <div class="calendar-column">
          <div class="date-label">
            <span>${WEEKDAY_LABEL[labelIndex]}</span>
            <span>${date}</span>
          </div>
          <div class="service empty" data-date=${date}>No service</div>
        </div>
        `;
        labelIndex++;
      });
    } else {
      // To be written for smaller screens
      calendarContainer.classList.add("mobile");
      dHtml += `<div id="dateWrapper">`;
      dateArray.forEach((date) => {
        dHtml += `
        <div class="date-column">
          <div class="mobile-date-label">
            <p>${WEEKDAY_LABEL[labelIndex]}</p>
            <div class="date-to-choose" 
            data-date="${date}"
            >
              <p>${Number(date.slice(8, 10))}</p>
            </div>
          </div>
        </div>
        `;
        labelIndex++;
      });

      dHtml += `
      </div>
      <div id="mobileServiceContainer">
        <p id="availabilityDate">Availability for ${formatDateForMobileCalendar(selectedDate)}</p>
        <div id="mobileServiceSlots" class="empty">
        </div>
      </div>
      `;
    }
    calendarContainer.innerHTML = dHtml;

    const selectedDateStr = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth()+1).padStart(2,'0')}-${String(selectedDate.getDate()).padStart(2,'0')}`;
    const activeEl = document.querySelector(`.date-to-choose[data-date="${selectedDateStr}"]`);
    if (activeEl) activeEl.classList.add('active');


  }

  /**
   * Send requests to parent window for service slots rendering
   * for a given service id.
   */
  function requestServiceSlots(serviceId) {
    const serviceType = services.find(s => s.id == serviceId)?.serviceType;

    if (serviceType == "APPOINTMENT") {
      window.parent.postMessage({
        type: "GET_APPO_SLOTS",
        data: {
          serviceId: serviceId, 
          startDate: formatDate(getMonday(headerDate)),
          endDate: formatDate(getSunday(headerDate))
        }
      }, '*');

    } else if (serviceType == "CLASS") {
      window.parent.postMessage({
        type: "GET_CLS_SLOTS",
        data: {
          serviceId: serviceId,
          startDate: formatDate(getMonday(headerDate)),
          endDate: formatDate(getSunday(headerDate))
        }
      }, '*');
    }

    loadingMsg.classList.remove("hidden");
    calendarContainer.classList.add("hidden");
    clearPrevSlots();
  }

  /**
   * Renders appointment slots based on the data passed from parent window.
   */
  function renderAppoSlots(data) {
    let rawHtml = ``;
    const select = serviceSelectState;
    const serviceName = select.options[select.selectedIndex].text;
    const serviceId = select.options[select.selectedIndex].value;
    let targetMemory;

    if (isLgScreen) {
      data.forEach((s) => {
        const target = document.querySelector(`.service[data-date="${new Date(s.endDate).getDate()}"]`);
        if (!targetMemory) {
          targetMemory = target;
        } else {
          if (targetMemory !== target) {
            rawHtml = "";
            targetMemory = target;
          }
        }

        const duration = new Date(s.endDate) - new Date(s.startDate);
        const durationFormatted = formatDuration(duration);
        
        for (let i = 1; i <= s.staffList.length; i++){
          rawHtml += `
          <div class='avai-service avai-appo'>
            <div class='service-main-info'>
              <p class='service-time'>${hourFormat(new Date(s.startDate))} - ${hourFormat(new Date(s.endDate))}</p>
              <p class='service-title'>${serviceName}</p>
            </div>
            <div class='service-sec-info'>
              <p class='staff'>${s.staffList[i-1].name}</p>
              <p class='duration'>${durationFormatted}</p>
            </div>
            <button class='book-appo book-service gelasio'
            data-service-id='${serviceId}'
            data-staff-id='${s.staffList[i-1]._id}'
            data-start-date='${s.startDate}'
            data-end-date='${s.endDate}'>
            Book
            </button>
          </div>
          `;
        }
        target.classList.remove("empty");
        target.innerHTML = rawHtml;
      });
      loadingMsg.classList.add("hidden");
      calendarContainer.classList.remove("hidden");
    } else {
      // const dot = document.createElement("p");
      // dot.textContent = "•";

      if (data.length > 0) {
        
        let loadedServicesHtml = '';
        const selectedDatePure = `${selectedDate.getFullYear()}-${String(selectedDate.getMonth()+1).padStart(2,'0')}-${String(selectedDate.getDate()).padStart(2,'0')}`;

        data.forEach((s) => {
          const duration = new Date(s.endDate) - new Date(s.startDate);
          const durationFormatted = formatDuration(duration);
          // const target = document.querySelector(`.date-to-choose[data-date="${new Date(s.endDate).getDate()}"]`);
          const target = document.querySelector(`.date-to-choose[data-date="${s.endDate.slice(0, 10)}"]`);
          
          if (!target.classList.contains("dot")) {
            target.classList.add("dot");
          }

          // let outerClassList = "mobile avai-service avai-appo";
          // if (new Date(s.endDate).getDate() != selectedDate.getDate()) {
          //   outerClassList += " hidden";
          // }

          let outerClassList = "mobile avai-service avai-appo";
          if (s.endDate.slice(0, 10) !== selectedDatePure) {
            outerClassList += " hidden";
          }

          for (let i = 1; i <= s.staffList.length; i++){
            loadedServicesHtml += `
            <div class="${outerClassList}" data-end-date='${s.endDate}' data-end-date-pure='${s.endDate.slice(0, 10)}'>
              <div class='service-main-info'>
                <p class='service-time'>${hourFormat(new Date(s.startDate))} - ${hourFormat(new Date(s.endDate))}</p>
                <p class='service-title'>${serviceName}</p>
              </div>
              <div class='service-sec-info'>
                <p class='staff'>${s.staffList[i-1].name}</p>
                <p class='duration'>${durationFormatted}</p>
              </div>
              <button class='book-appo book-service gelasio'
              data-service-id='${serviceId}'
              data-staff-id='${s.staffList[i-1]._id}'
              data-start-date='${s.startDate}'
              data-end-date='${s.endDate}'>
              Book
              </button>
            </div>
            `;
          }
        });
        const mobileServiceSlots = document.getElementById("mobileServiceSlots");
        mobileServiceSlots.innerHTML = loadedServicesHtml;
        mobileServiceSlots.classList.remove("empty");
        fixMobileSlotLayout();
      }
      loadingMsg.classList.add("hidden");

  /**
   * Renders dropdown selection options based on the data 
   * passed from parent window.
   */
  function renderDropdown(data) {
    const serviceList = document.getElementById("serviceSelectList");
    const errorMsg = document.getElementById("errorMsg");

    if (data.length != 0) {
      errorMsg.classList.add("hidden");

      data.forEach((s) => {
        serviceSelectState.options.push({ text: s.name, value: s.id });

        const li = document.createElement("li");
        li.textContent = s.name;
        li.addEventListener('click', () => {
          const idx = serviceSelectState.options.findIndex(o => o.value === s.id);
          serviceSelectState.selectedIndex = idx;
          serviceSelectState.value = s.id;
          document.querySelector('#serviceSelect .selector-label').textContent = s.name;
          serviceList.querySelectorAll('li').forEach(l => l.classList.remove('selected'));
          li.classList.add('selected');
          closeAllDropdowns();
          requestServiceSlots(s.id);
        });
        serviceList.appendChild(li);
      });
    } else {
      errorMsg.innerHTML = "No service is found. Please contact us to book.";
      errorMsg.classList.remove("hidden");

      const p = document.createElement("p");
      p.textContent = "No service";
      serviceList.appendChild(p);
    }
  }

  /* Helper functions */
  /** 
   * Return the mm-yy info for calendar header.
   */
  function getCalendarHeader(date) {
    const monday = getMonday(date)
    const sunday = getSunday(date)
 
    // Show both years if a week falls in to them, e.g. Dec 2024 - Jan 2025
    if (monday.getFullYear() != sunday.getFullYear()) {
      return `${monthName[monday.getMonth()]} ${monday.getFullYear()} — ${monthName[sunday.getMonth()]} ${sunday.getFullYear()}`
    } else {
      // Show both months if a week falls in two months, e.g. Apr - May 2026
      if (monday.getMonth() != sunday.getMonth()) {
        
        return `${monthName[monday.getMonth()]} — ${monthName[sunday.getMonth()]} ${sunday.getFullYear()}`
      // Otherwise just return MM YY, e.g. Apr 2026
      } else {
        return `${monthName[monday.getMonth()]} ${monday.getFullYear()}`
      }
    }
  }

  /** 
   * Return an array of date list for the selected week.
   * e.g. [4, 5, 6, 7, 8, 9, 10]
   */
  function getWeekList(date) {
    const monday = getMonday(date);
    const sunday = getSunday(date);
    const days = [];

    const d = new Date(monday);

    while(d <= sunday) {
      days.push(d.getDate());
      d.setDate(d.getDate() + 1);
    }

    return days;
  }

  /** 
   * Return an array of date list for the selected week.
   * e.g. ["2026-12-01", "2026-12-02", ...]
   */
  function getWeekListForMobile(date) {
    const monday = getMonday(date);
    const sunday = getSunday(date);
    const days = [];
    const d = new Date(monday);
    while (d <= sunday) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      days.push(`${year}-${month}-${day}`);
      d.setDate(d.getDate() + 1);
    }
    return days;
  }

  /** 
   * Take a Date object, return the formatted string for API query.
   */
  function formatDate(d) {
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hours = String(d.getHours()).padStart(2, '0');
    const minutes = String(d.getMinutes()).padStart(2, '0');
    const seconds = String(d.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
  }

  /** 
   * Take an int (ms), return the formatted hr&min display of duration.
   */
  function formatDuration(ms) {
    const totalMinutes = Math.floor(ms / 60000);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    
    if (hours > 0 && minutes > 0) {
      return `${hours}hr${minutes}min`;
    } else if (hours > 0) {
      return `${hours}hr`;
    } else {
      return `${minutes}min`;
    }
  }

  /** 
   * Take a Date object, return a Date object which is the Monday of
   * the week the parameter falls into.
   * 
   * e.g. return 4 May 2026 for 5 May 2026.
   */
  function getMonday(date) {
    // Make a copy to work with
    const d = new Date(date)

    const param = d.getDay() == 0 ? -6 : 1
    d.setDate(d.getDate() + param - d.getDay())
    d.setHours(0, 30, 0, 0)
    return d
  }

  /** 
   * Take a Date object, return a Date object which is the Sunday of
   * the week the parameter falls into.
   * 
   * e.g. return 10 May 2026 for 5 May 2026.
   */
  function getSunday(date) {
    const d = new Date(date)

    const param = d.getDay() == 0 ? 0 : 7
    d.setDate(d.getDate() + param - d.getDay())
    d.setHours(23, 30, 0, 0)
    return d
  }

  /** 
   * Take a Date object, return string of the hour in this format: "hh:mm"
   * 
   * e.g. return 10:30.
   */
  function hourFormat(date) {
    // Pad the hour with a leading zero if it's less than 10
    const hour = date.getHours();
    const minutes = date.getMinutes();

    const paddedHour = String(hour).padStart(2, '0');
    const paddedMinutes = String(minutes).padStart(2, '0');
    return `${paddedHour}:${paddedMinutes}`;
  }

  function formatDateForMobileCalendar(date) {
    const options = { weekday: 'long', month: 'short', day: 'numeric' };
    return date.toLocaleDateString("en-GB", options);
  }

  function fixMobileSlotLayout() {
    const container = document.getElementById("mobileServiceSlots");
    const visible = [...container.querySelectorAll('.mobile.avai-service:not(.hidden)')];

    // Span full width if only one visible slot
    container.classList.toggle('single-visible', visible.length === 1);

    // Re-apply borders based on visual position, not DOM index
    visible.forEach((el, i) => {
      el.style.borderRight = (i % 2 === 0) ? '0.5px solid #a4a4a4' : 'none';
      el.style.borderBottom = '0.5px solid #a4a4a4';
    });
  }
